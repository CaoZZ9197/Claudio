<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claudio AI Radio</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="Personal AI radio with Claude DJ" />
  <link id="theme-stylesheet" rel="stylesheet" href="/themes/dark.css" />
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎵</text></svg>" />
  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Claudio" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
</head>
<body>
  <!-- Offline banner -->
  <div id="offline-banner" class="offline-banner" hidden>离线模式 — 部分功能不可用</div>

  <div id="app">
    <!-- Player Bar -->
    <header class="player-bar">
      <div class="now-playing">
        <div class="track-info">
          <div class="track-title" id="track-title">Claudio AI Radio</div>
          <div class="track-artist" id="track-artist">等待播放...</div>
        </div>
      </div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btn-prev" title="上一首">⏮</button>
        <button class="ctrl-btn play-btn" id="btn-play" title="播放">▶</button>
        <button class="ctrl-btn" id="btn-next" title="下一首">⏭</button>
        <button class="ctrl-btn" id="btn-volume" title="音量">🔊</button>
      </div>
      <div class="volume-slider-container">
        <input type="range" id="volume-slider" min="0" max="100" value="80" />
      </div>
      <button class="ctrl-btn install-btn" id="btn-install" title="安装应用" hidden>📲</button>
    </header>

    <!-- Main Content Tabs -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-tab="chat">对话</button>
      <button class="tab-btn" data-tab="player">播放器</button>
      <button class="tab-btn" data-tab="profile">口味</button>
      <button class="tab-btn" data-tab="settings">设置</button>
    </nav>

    <!-- Tab Panels -->
    <main class="content">
      <!-- Chat Panel -->
      <section class="tab-panel active" id="panel-chat">
        <div class="chat-messages" id="chat-messages">
          <div class="message assistant">
            <div class="message-content">你好！我是Claudio，你的AI音乐DJ。有什么想听的或者想聊的吗？</div>
          </div>
        </div>
        <form class="chat-input-area" id="chat-form">
          <input type="text" id="chat-input" placeholder="说点什么..." autocomplete="off" />
          <button type="submit" class="send-btn">发送</button>
        </form>
        <div class="thinking-indicator" id="thinking-indicator" hidden>
          <span>Claudio正在思考...</span>
        </div>
      </section>

      <!-- Player Panel -->
      <section class="tab-panel" id="panel-player">
        <div class="player-display">
          <div class="album-art" id="album-art">🎵</div>
          <div class="player-track-title" id="player-track-title">等待播放</div>
          <div class="player-track-artist" id="player-track-artist">-</div>
        </div>
        <div class="progress-container">
          <span id="current-time">0:00</span>
          <input type="range" id="progress-bar" min="0" max="100" value="0" />
          <span id="total-time">0:00</span>
        </div>
        <div class="player-buttons">
          <button class="ctrl-btn lg" id="btn-player-play">▶</button>
        </div>
        <div class="playlist-section">
          <h3>播放列表</h3>
          <div class="search-box">
            <input type="text" id="search-input" placeholder="搜索歌曲..." />
            <button id="btn-search">🔍</button>
          </div>
          <div class="search-results" id="search-results"></div>
        </div>
      </section>

      <!-- Profile Panel -->
      <section class="tab-panel" id="panel-profile">
        <h3>音乐口味</h3>
        <textarea id="taste-editor" class="profile-editor" placeholder="描述你的音乐口味..."></textarea>

        <h3>心情规则</h3>
        <textarea id="mood-rules-editor" class="profile-editor" placeholder="根据心情推荐音乐的规则..."></textarea>

        <h3>播放列表</h3>
        <textarea id="playlists-editor" class="profile-editor" placeholder='{"default": ["playlist_id"]}'></textarea>

        <button class="save-btn" id="btn-save-profile">保存口味设置</button>
        <div class="save-status" id="profile-save-status"></div>
      </section>

      <!-- Settings Panel -->
      <section class="tab-panel" id="panel-settings">
        <h3>API 设置</h3>
        <div class="settings-group">
          <label>
            <span>Claude API Key</span>
            <input type="password" id="setting-anthropic-key" placeholder="sk-ant-..." />
          </label>
          <label>
            <span>Fish Audio API Key</span>
            <input type="password" id="setting-fishaudio-key" placeholder="API Key" />
          </label>
          <label>
            <span>网易云音乐 AppID</span>
            <input type="password" id="setting-netease-appid" placeholder="AppID" />
          </label>
          <label>
            <span>网易云音乐 PrivateKey</span>
            <input type="password" id="setting-netease-privatekey" placeholder="PrivateKey" />
          </label>
        </div>

        <h3>时间设置</h3>
        <div class="settings-group">
          <label>
            <span>早晨规划时间</span>
            <input type="time" id="setting-morning-planning" value="07:00" />
          </label>
          <label>
            <span>早晨播报时间</span>
            <input type="time" id="setting-morning-broadcast" value="09:00" />
          </label>
          <label>
            <span>心情检查间隔（小时）</span>
            <input type="number" id="setting-mood-check" value="3" min="1" max="12" />
          </label>
        </div>

        <button class="save-btn" id="btn-save-settings">保存设置</button>
        <div class="save-status" id="settings-save-status"></div>
      </section>
    </main>
  </div>

  <!-- Audio element for TTS and music playback -->
  <audio id="audio-player" hidden></audio>

  <script src="/app.js" type="module"></script>
</body>
</html>
