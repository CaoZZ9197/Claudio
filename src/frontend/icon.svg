<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Music note with safe-zone padding (content within 60% of canvas) -->
  <g transform="translate(256,256)">
    <!-- Note head -->
    <ellipse cx="-30" cy="60" rx="42" ry="32" fill="#38bdf8" transform="rotate(-15,-30,60)"/>
    <!-- Stem -->
    <rect x="8" y="-70" width="8" height="130" rx="4" fill="#38bdf8"/>
    <!-- Flag -->
    <path d="M16,-70 Q60,-50 70,-10 Q55,-40 16,-50 Z" fill="#38bdf8"/>
    <!-- Second note head -->
    <ellipse cx="50" cy="40" rx="30" ry="24" fill="#818cf8" transform="rotate(-10,50,40)"/>
    <rect x="40" y="-60" width="7" height="100" rx="3.5" fill="#818cf8"/>
    <!-- Note flag 2 -->
    <path d="M47,-60 Q80,-40 85,-5 Q72,-30 47,-40 Z" fill="#818cf8"/>
  </g>
</svg>
